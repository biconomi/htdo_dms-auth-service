version: "3.8"

services:
  dms-auth:
    image: harbor.hyundaitaydo.com.vn:8015/htdo_dms-auth-service/dms_htv:${IMAGE_TAG}
    deploy:
        replicas: 1
        placement:
            constraints:
                - node.role == manager
        resources:
              limits:
                  cpus: "1.0"
                  memory: 1024M
              reservations:
                  memory: 1024M
    ports:
      - "3001:3000"
    volumes:
      - /home/htdo/htdo/dms-auth-service/.env:/app/.env
    environment:
      NODE_ENV: production
    networks:
      - htdo_net
networks:
    htdo_net:
        external: true
